<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>行銷素材拍攝意願調查表</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Noto Sans TC",sans-serif;
  background:#f5f5f7;
  color:#111;
}

.container{
  max-width:720px;
  margin:auto;
  padding:24px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:32px;
  box-shadow:0 20px 60px rgba(0,0,0,.08);
}

h1{font-size:32px;margin:0 0 12px;}
p{color:#666;line-height:1.7;}

input,select,textarea{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
}

.primary{background:#111;color:#fff;}
.secondary{background:#eee;}

.step{display:none;}
.step.active{display:block;}

.progress{
  height:6px;
  background:#eee;
  border-radius:999px;
  margin-top:20px;
}

.bar{
  height:100%;
  background:#111;
  width:0%;
  border-radius:999px;
}

.choice{
  padding:14px;
  border:1px solid #ddd;
  border-radius:16px;
  margin-bottom:10px;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.show{display:flex;}

.modal-box{
  background:#fff;
  padding:24px;
  border-radius:20px;
  max-width:500px;
  width:100%;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<!-- STEP 0 -->
<div class="step active" data-step="0">
<h1>行銷素材拍攝意願調查表</h1>
<p>
本表單僅提供有意願之同仁填寫，並不代表一定會安排拍攝。<br>
拍攝時間將依內容需求及門市營運狀況彈性安排，且不影響既有工作規劃。<br>
請依自身狀況審慎評估是否參與。
</p>

<button id="startBtn" class="primary" style="margin-top:20px;width:100%;">
開始填寫
</button>
</div>

<!-- STEP 1 -->
<div class="step" data-step="1">
<h1>你的姓名</h1>
<input id="name">
</div>

<!-- STEP 2 -->
<div class="step" data-step="2">
<h1>員編（6碼）</h1>
<input id="employeeId" inputmode="numeric">
</div>

<!-- STEP 3 -->
<div class="step" data-step="3">
<h1>Email</h1>
<input id="email" type="email">
</div>

<!-- STEP 4 -->
<div class="step" data-step="4">
<h1>門市</h1>
<input id="storeSearch" placeholder="輸入6碼或名稱">
</div>

<!-- STEP 5 -->
<div class="step" data-step="5">
<h1>聯絡方式</h1>
<input id="phone" placeholder="手機後8碼">
<input id="line" placeholder="或 LINE ID">
</div>

<!-- STEP 6 -->
<div class="step" data-step="6">
<h1>IG</h1>
<input id="ig">
</div>

<!-- STEP 7 -->
<div class="step" data-step="7">
<h1>拍攝形式</h1>
<label><input type="checkbox" value="照片" name="types">照片</label>
<label><input type="checkbox" value="影片" name="types">影片</label>
</div>

<!-- STEP 8 -->
<div class="step" data-step="8">
<h1>可露臉</h1>
<select id="face">
<option value="">選擇</option>
<option>可以</option>
<option>不露臉</option>
</select>
</div>

<!-- STEP 9 -->
<div class="step" data-step="9">
<h1>授權</h1>
<label><input type="checkbox" id="auth">同意授權</label>
</div>

<!-- STEP 10 -->
<div class="step" data-step="10">
<h1>完成</h1>
<p>感謝填寫</p>
</div>

<!-- BUTTONS -->
<div style="margin-top:20px;display:flex;gap:10px;">
<button id="prev" class="secondary">上一頁</button>
<button id="next" class="primary">下一頁</button>
<button id="review" class="primary" style="display:none;">確認資料</button>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>確認資料</h3>
<div id="summary"></div>
<button id="submit" class="primary">確認送出</button>
</div>
</div>

<script>

const steps = document.querySelectorAll(".step");
let current = 0;

const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("next");
const prevBtn = document.getElementById("prev");
const reviewBtn = document.getElementById("review");

const bar = document.getElementById("bar");

function showStep(i){
steps.forEach((s,index)=>{
s.classList.toggle("active",index===i);
});

bar.style.width = (i/9)*100+"%";

/* 按鈕控制（重點修正） */
if(i===0){
startBtn.style.display="block";
nextBtn.style.display="none";
prevBtn.style.display="none";
reviewBtn.style.display="none";
}
else if(i===9){
nextBtn.style.display="none";
reviewBtn.style.display="block";
prevBtn.style.display="block";
}
else if(i===10){
nextBtn.style.display="none";
prevBtn.style.display="none";
reviewBtn.style.display="none";
}
else{
startBtn.style.display="none";
nextBtn.style.display="block";
prevBtn.style.display="block";
reviewBtn.style.display="none";
}
}

startBtn.onclick=()=>{
current=1;
showStep(current);
};

nextBtn.onclick=()=>{
current++;
showStep(current);
};

prevBtn.onclick=()=>{
current--;
showStep(current);
};

reviewBtn.onclick=()=>{
const data = {
name:name.value,
employeeId:employeeId.value,
email:email.value
};

summary.innerHTML = JSON.stringify(data,null,2);
modal.classList.add("show");
};

submit.onclick=()=>{
alert("已送出");
modal.classList.remove("show");
current=10;
showStep(current);
};

showStep(0);

</script>

</body>
</html>
