<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>門市拍攝協助意願調查表</title>

<style>
:root{
  --red:#d71920;
  --black:#111;
  --gray:#666;
}

body{
  margin:0;
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei";
  background:#f3f3f3;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:30px;
}

.step{display:none;}
.step.active{display:block;}

h2{margin:0 0 10px;}

input,select,textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

.choice{
  border:1px solid #ddd;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
}

.next{background:#111;color:#fff;}
.prev{background:#eee;}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:10px;
}

.progress{
  height:6px;
  background:#eee;
}

.bar{
  height:6px;
  background:var(--red);
  width:0%;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.show{display:flex;}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:600px;
}
</style>
</head>

<body>

<div class="container">

<form id="form" class="card">

<!-- STEP 1 -->
<div class="step active">
<h2>姓名</h2>
<input id="name">
</div>

<!-- STEP 2 -->
<div class="step">
<h2>員編</h2>
<input id="employeeId">
</div>

<!-- STEP 3 -->
<div class="step">
<h2>Email</h2>
<input id="email">
</div>

<!-- STEP 4 -->
<div class="step">
<h2>門市</h2>
<select id="store"></select>
</div>

<!-- STEP 5 -->
<div class="step">
<h2>聯絡方式</h2>
<input id="contact">
</div>

<!-- STEP 6 -->
<div class="step">
<h2>IG</h2>
<input id="ig">
</div>

<!-- STEP 7 (重點修正) -->
<div class="step">
<h2>可接受拍攝形式（可複選）</h2>

<label class="choice"><input type="checkbox" name="types" value="平面照片"> 平面照片</label>
<label class="choice"><input type="checkbox" name="types" value="動態影片（無口播）"> 動態影片（無口播）</label>
<label class="choice"><input type="checkbox" name="types" value="動態影片（含口播）"> 動態影片（含口播）</label>
<label class="choice"><input type="checkbox" name="types" value="鞋款穿搭展示"> 鞋款穿搭展示</label>
<label class="choice"><input type="checkbox" name="types" value="門市情境拍攝"> 門市情境拍攝</label>

</div>

<!-- STEP 8 -->
<div class="step">
<h2>是否可露臉</h2>
<select id="face">
<option value="">請選擇</option>
<option>可以</option>
<option>不露臉</option>
</select>
</div>

<!-- STEP 9 -->
<div class="step">
<h2>穿搭</h2>
<select id="outfit">
<option value="">請選擇</option>
<option>可以</option>
<option>不方便</option>
</select>
</div>

<!-- STEP 10 -->
<div class="step">
<h2>拍攝經驗</h2>
<select id="experience">
<option value="">請選擇</option>
<option>有</option>
<option>沒有</option>
</select>
</div>

<!-- STEP 11 -->
<div class="step">
<h2>補充</h2>
<textarea id="expDetail"></textarea>
</div>

<!-- STEP 12 -->
<div class="step">
<h2>作品連結</h2>
<input id="portfolio">
</div>

<!-- STEP 13 -->
<div class="step">
<h2>是否優先參與</h2>
<select id="priority">
<option>願意</option>
<option>視情況</option>
</select>
</div>

<!-- STEP 14 -->
<div class="step">
<h2>授權</h2>
<label><input type="checkbox" id="authorized"> 同意授權</label>
</div>

<!-- STEP 15 -->
<div class="step">
<h2>完成</h2>
<p>期待與你一同拍攝</p>
</div>

<div style="margin-top:20px;">
<button type="button" id="prev" class="prev">上一頁</button>
<button type="button" id="next" class="next">下一頁</button>
<button type="button" id="review" class="next" style="display:none;">確認資料</button>
</div>

</form>
</div>

<!-- progress -->
<div class="footer">
<div class="progress"><div id="bar" class="bar"></div></div>
</div>

<!-- modal -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>確認資料</h3>
<div id="summary"></div>
<br>
<button id="edit">返回修改</button>
<button id="submit">確認送出</button>
</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxfJS57Zghi6c1ZTU1wsUalab1ssDqs6XSG-BFuMQ7zwkIYPdtrZeOml7piDpkIinJh/exec";

const steps=document.querySelectorAll(".step");
let step=0;

const bar=document.getElementById("bar");

function show(){
steps.forEach((s,i)=>s.classList.toggle("active",i===step));
bar.style.width=((step+1)/14*100)+"%";

document.getElementById("review").style.display = (step===13)?"inline-block":"none";
document.getElementById("next").style.display = (step===13)?"none":"inline-block";
}

document.getElementById("next").onclick=()=>{
if(step===6){
if(!document.querySelectorAll('input[name="types"]:checked').length){
alert("請至少選一項");
return;
}
}
step++;
show();
};

document.getElementById("prev").onclick=()=>{
if(step>0){step--;show();}
};

function getData(){
return{
name:name.value,
employeeId:employeeId.value,
email:email.value,
store:store.value,
contact:contact.value,
ig:ig.value,
types:[...document.querySelectorAll('input[name="types"]:checked')].map(e=>e.value),
face:face.value,
outfit:outfit.value,
experience:experience.value,
expDetail:expDetail.value,
portfolio:portfolio.value,
priority:priority.value,
authorized:authorized.checked
};
}

document.getElementById("review").onclick=()=>{
const d=getData();
summary.innerHTML=Object.entries(d).map(([k,v])=>`<p><b>${k}</b>: ${v}</p>`).join("");
modal.classList.add("show");
};

document.getElementById("edit").onclick=()=>modal.classList.remove("show");

document.getElementById("submit").onclick=async()=>{
const res=await fetch(API,{
method:"POST",
body:JSON.stringify(getData())
});
modal.classList.remove("show");
step=14;
show();
};

show();
</script>

</body>
</html>
